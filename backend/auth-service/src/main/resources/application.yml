spring:
  application:
    name: auth-service
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-this-in-production-min-32-chars}
    expiration: 86400000
    refresh:
      expiration: 604800000

logging:
  level:
    root: INFO
    com.bloodlink: DEBUG
