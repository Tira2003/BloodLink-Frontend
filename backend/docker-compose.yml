version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bloodlink-postgres
    environment:
      POSTGRES_DB: bloodlink_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - bloodlink-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: bloodlink-api-gateway
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bloodlink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: bloodlink-user-service
    ports:
      - "8081:8081"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bloodlink_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bloodlink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  donation-service:
    build:
      context: ./donation-service
      dockerfile: Dockerfile
    container_name: bloodlink-donation-service
    ports:
      - "8082:8082"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bloodlink_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bloodlink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: bloodlink-inventory-service
    ports:
      - "8083:8083"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bloodlink_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bloodlink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: bloodlink-notification-service
    ports:
      - "8084:8084"
    environment:
      JAVA_OPTS: "-Xmx512m -Xms256m"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bloodlink_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bloodlink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:

networks:
  bloodlink-network:
    driver: bridge
