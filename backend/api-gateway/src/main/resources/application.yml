spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      enabled: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - AddRequestHeader=X-Gateway-Auth, true
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**,/api/donors/**,/api/patients/**,/api/hospitals/**
          filters:
            - AddRequestHeader=X-Gateway-Auth, true
        - id: donation-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/donations/**
          filters:
            - AddRequestHeader=X-Gateway-Auth, true
        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventory/**,/api/blood-units/**
          filters:
            - AddRequestHeader=X-Gateway-Auth, true
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**
          filters:
            - AddRequestHeader=X-Gateway-Auth, true
  web:
    cors:
      allowed-origins: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: "*"
      exposed-headers: Authorization,Content-Type
      allow-credentials: true
      max-age: 3600

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.bloodlink: DEBUG
